    <text x="160" y="232" font-family="Outfit, Arial Black, sans-serif" font-weight="900" font-size="240" text-anchor="middle" fill="url(#acc)" filter="url(#glow)" opacity="0.6">L</text>
    <text x="160" y="232" font-family="Outfit, Arial Black, sans-serif" font-weight="900" font-size="240" text-anchor="middle" fill="url(#acc)">L</text>
  </g>
  <circle cx="430" cy="82" r="14" fill="#ffab00"/>
